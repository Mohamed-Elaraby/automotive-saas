name: Deploy to Vultr (main)

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-main
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Load SSH key
        uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.VULTR_SSH_KEY }}

      - name: Add server to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p ${{ secrets.VULTR_PORT }} -H ${{ secrets.VULTR_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy
        env:
          HOST: ${{ secrets.VULTR_HOST }}
          PORT: ${{ secrets.VULTR_PORT }}
          USER: ${{ secrets.VULTR_USER }}
        run: |
          # Fail fast if USER/HOST/PORT are empty
          test -n "$HOST"
          test -n "$PORT"
          test -n "$USER"

          ssh -T -p "$PORT" \
          -o BatchMode=yes \
          -o StrictHostKeyChecking=yes \
          -o ServerAliveInterval=30 \
          -o ServerAliveCountMax=10 \
          -o TCPKeepAlive=yes \
          -o ConnectTimeout=30 \
          "$USER@$HOST" 'bash -s' <<'EOF'
          set -euo pipefail
          set -x

          APP_DIR="/var/www/automotive"
          cd "$APP_DIR"

          # Always bring app back up even if something fails
          trap 'php artisan up || true' EXIT

          echo "==> Fix runtime dirs permissions (storage & cache)"
          sudo -n /bin/chown -R www-data:www-data storage bootstrap/cache || true
          sudo -n /bin/chmod -R 2775 storage bootstrap/cache || true

          echo "==> Protect runtime .gitignore from git reset"
          git update-index --skip-worktree bootstrap/cache/.gitignore || true
          git update-index --skip-worktree storage/app/.gitignore || true
          git update-index --skip-worktree storage/app/public/.gitignore || true
          git update-index --skip-worktree storage/framework/.gitignore || true
          git update-index --skip-worktree storage/framework/cache/.gitignore || true
          git update-index --skip-worktree storage/framework/cache/data/.gitignore || true
          git update-index --skip-worktree storage/framework/sessions/.gitignore || true
          git update-index --skip-worktree storage/framework/testing/.gitignore || true
          git update-index --skip-worktree storage/framework/views/.gitignore || true
          git update-index --skip-worktree storage/logs/.gitignore || true

          echo "==> Pull latest code"
          git fetch origin main
          git reset --hard origin/main

          echo "==> Install PHP deps"
          timeout 10m composer install --no-dev --prefer-dist --no-interaction --optimize-autoloader

          echo "==> Frontend build"
          timeout 10m npm ci
          timeout 10m npm run build

          echo "==> Maintenance ON (short window)"
          php artisan down --render="errors::503" || true

          echo "==> Central migrations only"
          php artisan migrate --force

          echo "==> Optimize caches"
          php artisan optimize:clear
          php artisan config:cache
          php artisan route:cache || true
          php artisan view:cache || true
          php artisan event:cache || true

          echo "==> Restart PHP-FPM"
          sudo -n /usr/bin/systemctl restart php8.2-fpm || true

          echo "==> Restart workers"
          php artisan queue:restart || true

          echo "==> Reload supervisor configs"
          timeout 15s sudo -n /usr/bin/supervisorctl reread || true
          timeout 15s sudo -n /usr/bin/supervisorctl update || true

          echo "==> Restart worker (non-blocking)"
          timeout 15s sudo -n /usr/bin/supervisorctl restart automotive-worker:automotive-worker_00 || true

          echo "==> Check worker status"
          WORKER_STATUS="$(timeout 10s sudo -n /usr/bin/supervisorctl status automotive-worker:automotive-worker_00 || true)"
          echo "$WORKER_STATUS"

          if echo "$WORKER_STATUS" | grep -qi "STOPPING"; then
            echo "==> Worker stuck in STOPPING, force killing queue:work"
            timeout 5s sudo -n /usr/bin/pkill -f "artisan queue:work" || true
            timeout 5s sudo -n /usr/bin/pkill -9 -f "artisan queue:work" || true
            timeout 10s sudo -n /usr/bin/supervisorctl start automotive-worker:automotive-worker_00 || true

            echo "==> Worker status after force restart"
            timeout 10s sudo -n /usr/bin/supervisorctl status automotive-worker:automotive-worker_00 || true
          fi

          timeout 10s sudo -n /usr/bin/supervisorctl status automotive-worker:automotive-worker_00 || true

          echo "==> Maintenance OFF"
          php artisan up || true

          echo "✅ Deploy done"
          EOF
